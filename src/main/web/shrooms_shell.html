<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
  <title>Shrooms</title>
  <link rel="icon" type="image/svg+xml" href="assets/shrooms/icon.svg">
  <style>
    @font-face {
      font-family: "Vera";
      src: url("assets/Vera.ttf") format("truetype");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Vera", sans-serif;
      background-color: #000;
      color: #dfd6ab;
      overflow-x: hidden;
      touch-action: manipulation;
    }

    #bg-tile-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .content {
      width: min(1100px, 96vw);
      margin-inline: auto;
      display: grid;
      gap: 10px;
      justify-items: center;
      align-content: start;
    }

    h1 {
      margin: 0;
      display: flex;
      justify-content: center;
      width: 100%;
    }

    #title-canvas {
      display: block;
      max-width: min(92vw, 430px);
      width: auto;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #status {
      margin: 0;
      min-height: 1rem;
      text-align: center;
      font-size: 0.78rem;
      color: #cfc6a0;
    }

    #game-shell {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #canvas {
      display: block;
      width: min(900px, 100%);
      height: auto;
      aspect-ratio: 1 / 1;
      background: #000;
      border: none !important;
      outline: none;
      box-shadow: none;
      touch-action: none;
      user-select: none;
    }

    #mobile-controls {
      width: min(900px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      padding: 4px 0 8px;
      align-items: stretch;
      pointer-events: none;
      visibility: hidden;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 120ms ease-out, transform 120ms ease-out;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    #mobile-controls * {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body.mobile-controls-active #mobile-controls {
      pointer-events: auto;
      visibility: visible;
      opacity: 1;
      transform: translateY(0);
    }

    .action-button {
      background: #000;
      border: 1px solid #fff;
      border-radius: 8px;
      color: #fff;
      font-size: clamp(1.1rem, 5vw, 1.45rem);
      padding: 10px 8px;
      min-height: 52px;
      line-height: 1;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    .controls-legend {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px 10px;
      color: #dfd6ab;
      font-size: clamp(0.68rem, 2.8vw, 0.82rem);
      line-height: 1.2;
      padding: 2px 4px 0;
    }

    .controls-legend div {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .controls-legend span:last-child {
      color: #fff;
      white-space: nowrap;
    }

    body.mobile-controls-active #status {
      visibility: hidden;
    }

    @media (pointer: coarse) and (orientation: portrait) {
      .content {
        width: min(620px, 100vw - 12px);
      }

      main {
        align-items: start;
        padding: 8px 6px 10px;
      }

      #mobile-controls {
        gap: 8px;
      }

      .action-button {
        padding: 10px 6px;
        min-height: 50px;
        font-size: clamp(1rem, 4.8vw, 1.3rem);
      }

    }
  </style>
</head>
<body>
  <canvas id="bg-tile-canvas" aria-hidden="true"></canvas>
  <main>
    <section class="content">
      <h1>
        <span class="sr-only">Shrooms</span>
        <canvas id="title-canvas" width="288" height="40" aria-hidden="true"></canvas>
      </h1>
      <p id="status">Downloading...</p>
      <div id="game-shell">
        <canvas id="canvas" width="900" height="900" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
      </div>
      <section id="mobile-controls" aria-label="Mobile controls" aria-hidden="true">
        <button id="move-left-button" class="action-button" type="button" aria-label="Move left">&#x2B05;&#xFE0F;</button>
        <button id="move-right-button" class="action-button" type="button" aria-label="Move right">&#x27A1;&#xFE0F;</button>
        <button id="fire-button" class="action-button" type="button" aria-label="Shoot">&#x1F4A5;</button>
        <button id="deploy-button" class="action-button" type="button" aria-label="Trap">&#x1FAA4;</button>
        <div class="controls-legend" aria-label="Control bindings">
          <div><span>&#x2B05;&#xFE0F; Move</span><span id="move-left-key">A</span></div>
          <div><span>&#x27A1;&#xFE0F; Move</span><span id="move-right-key">D</span></div>
          <div><span>&#x1F4A5; Shoot</span><span id="shoot-key">W</span></div>
          <div><span>&#x1FAA4; Trap</span><span id="trap-key">E</span></div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const statusElement = document.getElementById("status");
    const titleElement = document.querySelector("h1");
    const titleCanvas = document.getElementById("title-canvas");
    const canvasElement = document.getElementById("canvas");
    const bgTileCanvas = document.getElementById("bg-tile-canvas");
    const contentElement = document.querySelector(".content");
    const controlsElement = document.getElementById("mobile-controls");
    const moveLeftButton = document.getElementById("move-left-button");
    const moveRightButton = document.getElementById("move-right-button");
    const fireButton = document.getElementById("fire-button");
    const deployButton = document.getElementById("deploy-button");
    const moveLeftKeyLabel = document.getElementById("move-left-key");
    const moveRightKeyLabel = document.getElementById("move-right-key");
    const shootKeyLabel = document.getElementById("shoot-key");
    const trapKeyLabel = document.getElementById("trap-key");

    const KEY_A = 65;
    const KEY_D = 68;
    const KEY_W = 87;
    const KEY_E = 69;
    const ACTION_MOVE_LEFT = 0;
    const ACTION_MOVE_RIGHT = 1;
    const ACTION_SHOOT = 2;
    const ACTION_TRAP = 3;
    const BG_TILEMAP_URL = "assets/shrooms/tilemap.png";
    const BG_TILE_SIZE_VMIN = 20;
    const BG_ALPHA = 0.5;
    const TITLE_TEXT = "SHROOMS";
    const TITLE_GLYPHS = {
      S: [0x7c, 0xc6, 0x60, 0x38, 0x0c, 0xc6, 0x7c, 0x00],
      H: [0xc6, 0xc6, 0xc6, 0xfe, 0xc6, 0xc6, 0xc6, 0x00],
      R: [0xfc, 0x66, 0x66, 0x7c, 0x6c, 0x66, 0xe6, 0x00],
      O: [0x38, 0x6c, 0xc6, 0xc6, 0xc6, 0x6c, 0x38, 0x00],
      M: [0xc6, 0xee, 0xfe, 0xfe, 0xd6, 0xc6, 0xc6, 0x00],
    };

    const controlState = {
      runtimeReady: false,
      controlsActive: false,
      gameplayActive: false,
      pageAudioActive:
        !document.hidden &&
        (typeof document.hasFocus !== "function" || document.hasFocus()),
      moveLeftPointers: new Set(),
      moveRightPointers: new Set(),
      firePointers: new Set(),
      deployPointers: new Set(),
      heldKeys: new Set(),
      pollTimer: null,
    };

    const coarsePointerQuery = window.matchMedia("(pointer: coarse)");
    const portraitQuery = window.matchMedia("(orientation: portrait)");
    const backgroundState = {
      image: null,
      rafId: null,
    };
    const BG_TILE_PATTERN_COLUMNS = 8;
    const BG_TILE_PATTERN_ROWS = 8;
    const BG_TILE_PATTERN = [
      0, 1, 2, 3, 1, 0, 3, 2,
      2, 3, 0, 1, 3, 2, 1, 0,
      1, 0, 3, 2, 0, 1, 2, 3,
      1, 2, 3, 0, 2, 3, 0, 1,
      3, 2, 1, 0, 2, 3, 0, 1,
      0, 1, 2, 3, 1, 0, 3, 2,
      2, 3, 0, 1, 3, 2, 1, 0,
      1, 0, 3, 2, 0, 1, 2, 3,
    ];

    function computeBackgroundTileSizePx() {
      const vmin = Math.min(window.innerWidth, window.innerHeight) / 100;
      return Math.max(1, Math.round(BG_TILE_SIZE_VMIN * vmin));
    }

    function hashBackgroundTileCell(col, row) {
      let hash = Math.imul(col + 0x9e3779b9, 0x85ebca6b) ^
          Math.imul(row + 0xc2b2ae35, 0x27d4eb2f);
      hash ^= hash >>> 16;
      hash = Math.imul(hash, 0x7feb352d);
      hash ^= hash >>> 15;
      hash = Math.imul(hash, 0x846ca68b);
      hash ^= hash >>> 16;
      return hash >>> 0;
    }

    function pickTileVariantIndex(col, row, variantCount) {
      const patternCol = col % BG_TILE_PATTERN_COLUMNS;
      const patternRow = row % BG_TILE_PATTERN_ROWS;
      return BG_TILE_PATTERN[patternRow * BG_TILE_PATTERN_COLUMNS + patternCol] %
          variantCount;
    }

    function pickTileTransform(col, row) {
      const hash = hashBackgroundTileCell(col, row);
      return {
        flipX: (hash & 1) !== 0,
        flipY: (hash & 2) !== 0,
      };
    }

    function drawBackgroundTile(
        context,
        image,
        sourceRect,
        x,
        y,
        size,
        transform,
    ) {
      const [sx, sy, sw, sh] = sourceRect;
      context.save();
      context.translate(x + (transform.flipX ? size : 0), y + (transform.flipY ? size : 0));
      context.scale(transform.flipX ? -1 : 1, transform.flipY ? -1 : 1);
      context.drawImage(image, sx, sy, sw, sh, 0, 0, size, size);
      context.restore();
    }

    function drawPatternBackgroundTiles() {
      if (!bgTileCanvas || !backgroundState.image) {
        return;
      }

      const context = bgTileCanvas.getContext("2d");
      if (!context) {
        return;
      }

      const cssWidth = window.innerWidth;
      const cssHeight = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;

      bgTileCanvas.width = Math.max(1, Math.round(cssWidth * dpr));
      bgTileCanvas.height = Math.max(1, Math.round(cssHeight * dpr));
      bgTileCanvas.style.width = `${cssWidth}px`;
      bgTileCanvas.style.height = `${cssHeight}px`;

      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      context.clearRect(0, 0, cssWidth, cssHeight);
      context.globalAlpha = BG_ALPHA;
      context.imageSmoothingEnabled = false;

      const image = backgroundState.image;
      const halfWidth = Math.floor(image.naturalWidth / 2);
      const halfHeight = Math.floor(image.naturalHeight / 2);
      if (halfWidth <= 0 || halfHeight <= 0) {
        return;
      }

      const sourceRects = [
        [0, 0, halfWidth, halfHeight],
        [halfWidth, 0, image.naturalWidth - halfWidth, halfHeight],
        [0, halfHeight, halfWidth, image.naturalHeight - halfHeight],
        [halfWidth, halfHeight, image.naturalWidth - halfWidth, image.naturalHeight - halfHeight],
      ];
      const tileSizePx = computeBackgroundTileSizePx();
      const columns = Math.ceil(cssWidth / tileSizePx);
      const rows = Math.ceil(cssHeight / tileSizePx);

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < columns; col += 1) {
          const variantIndex = pickTileVariantIndex(col, row, sourceRects.length);
          drawBackgroundTile(
              context,
              image,
              sourceRects[variantIndex],
              col * tileSizePx,
              row * tileSizePx,
              tileSizePx,
              pickTileTransform(col, row),
          );
        }
      }
    }

    function scheduleBackgroundRedraw() {
      if (backgroundState.rafId !== null) {
        cancelAnimationFrame(backgroundState.rafId);
      }
      backgroundState.rafId = requestAnimationFrame(() => {
        backgroundState.rafId = null;
        drawPatternBackgroundTiles();
      });
    }

    function initBackgroundTiles() {
      if (!bgTileCanvas) {
        return;
      }

      const image = new Image();
      image.decoding = "async";
      image.onload = () => {
        backgroundState.image = image;
        scheduleBackgroundRedraw();
      };
      image.onerror = () => {
        console.error("Failed to load tiled background image.");
      };
      image.src = BG_TILEMAP_URL;
    }

    function drawGameFontTitle() {
      if (!titleCanvas) return;
      const context = titleCanvas.getContext("2d");
      if (!context) return;

      const glyphWidth = 8;
      const glyphHeight = 8;
      const spacing = 1;
      const mobile = window.innerWidth < 640;
      const pixelSize = mobile ? 4 : 5;
      const logicalWidth =
          TITLE_TEXT.length * glyphWidth + (TITLE_TEXT.length - 1) * spacing;
      const logicalHeight = glyphHeight;
      const cssWidth = logicalWidth * pixelSize;
      const cssHeight = logicalHeight * pixelSize;
      const dpr = window.devicePixelRatio || 1;

      titleCanvas.width = Math.round(cssWidth * dpr);
      titleCanvas.height = Math.round(cssHeight * dpr);
      titleCanvas.style.width = `${cssWidth}px`;
      titleCanvas.style.height = `${cssHeight}px`;

      context.setTransform(dpr, 0, 0, dpr, 0, 0);
      context.clearRect(0, 0, cssWidth, cssHeight);
      context.imageSmoothingEnabled = false;
      context.fillStyle = "#dfd6ab";

      let cursorX = 0;
      for (const letter of TITLE_TEXT) {
        const glyph = TITLE_GLYPHS[letter];
        if (!glyph) {
          cursorX += (glyphWidth + spacing) * pixelSize;
          continue;
        }
        for (let row = 0; row < glyphHeight; row += 1) {
          const bits = glyph[row];
          for (let col = 0; col < glyphWidth; col += 1) {
            const on = ((bits >> (glyphWidth - 1 - col)) & 1) === 1;
            if (!on) continue;
            context.fillRect(
                cursorX + col * pixelSize,
                row * pixelSize,
                pixelSize,
                pixelSize,
            );
          }
        }
        cursorX += (glyphWidth + spacing) * pixelSize;
      }
    }

    function bridgeReady() {
      return controlState.runtimeReady && typeof Module !== "undefined";
    }

    function requestAudioUnlock() {
      if (!bridgeReady() || typeof Module._shrooms_request_audio_unlock !== "function") {
        return;
      }
      Module._shrooms_request_audio_unlock();
    }

    function setPageActive(active) {
      controlState.pageAudioActive = active;
      if (!bridgeReady()) {
        return;
      }
      if (typeof Module._shrooms_set_page_audio_active === "function") {
        Module._shrooms_set_page_audio_active(active ? 1 : 0);
      }
      if (typeof Module._shrooms_set_page_active === "function") {
        Module._shrooms_set_page_active(active ? 1 : 0);
      }
    }

    function computePageActive() {
      return document.visibilityState === "visible" &&
        (typeof document.hasFocus !== "function" || document.hasFocus());
    }

    function syncPageActive() {
      setPageActive(computePageActive());
    }

    function pushKeyState(keyCode, pressed) {
      if (!bridgeReady() || typeof Module._shrooms_push_key_event !== "function") {
        return;
      }
      if (pressed) {
        requestAudioUnlock();
      }

      const hasKey = controlState.heldKeys.has(keyCode);
      if (pressed) {
        if (hasKey) return;
        controlState.heldKeys.add(keyCode);
      } else {
        if (!hasKey) return;
        controlState.heldKeys.delete(keyCode);
      }

      Module._shrooms_push_key_event(keyCode, pressed ? 1 : 0);
    }

    function setCanvasTouchscreenEnabled(enabled) {
      if (!bridgeReady() || typeof Module._shrooms_set_touchscreen_enabled !== "function") {
        return;
      }
      Module._shrooms_set_touchscreen_enabled(enabled ? 1 : 0);
    }

    function setMobileLayout(enabled) {
      if (!bridgeReady() || typeof Module._shrooms_set_mobile_layout !== "function") {
        return;
      }
      Module._shrooms_set_mobile_layout(enabled ? 1 : 0);
    }

    function actionFallbackKeyCode(action) {
      if (action === ACTION_MOVE_LEFT) return KEY_A;
      if (action === ACTION_MOVE_RIGHT) return KEY_D;
      if (action === ACTION_SHOOT) return KEY_W;
      if (action === ACTION_TRAP) return KEY_E;
      return 0;
    }

    function actionKeyCode(action) {
      if (bridgeReady() && typeof Module._shrooms_action_key_code === "function") {
        const keyCode = Module._shrooms_action_key_code(action);
        if (keyCode) return keyCode;
      }
      return actionFallbackKeyCode(action);
    }

    function keyLabel(keyCode) {
      if (keyCode >= 65 && keyCode <= 90) {
        return String.fromCharCode(keyCode);
      }
      if (keyCode >= 48 && keyCode <= 57) {
        return String.fromCharCode(keyCode);
      }
      if (keyCode === 37) return "Left";
      if (keyCode === 38) return "Up";
      if (keyCode === 39) return "Right";
      if (keyCode === 40) return "Down";
      return "?";
    }

    function updateControlLegend() {
      moveLeftKeyLabel.textContent = keyLabel(actionKeyCode(ACTION_MOVE_LEFT));
      moveRightKeyLabel.textContent = keyLabel(actionKeyCode(ACTION_MOVE_RIGHT));
      shootKeyLabel.textContent = keyLabel(actionKeyCode(ACTION_SHOOT));
      trapKeyLabel.textContent = keyLabel(actionKeyCode(ACTION_TRAP));
    }

    function queryGameplayActive() {
      if (!bridgeReady() || typeof Module._shrooms_is_gameplay_active !== "function") {
        return false;
      }
      return Module._shrooms_is_gameplay_active() !== 0;
    }

    function syncMoveKeys() {
      const moveLeft = controlState.moveLeftPointers.size > 0;
      const moveRight = controlState.moveRightPointers.size > 0;

      if (moveLeft && !moveRight) {
        pushKeyState(actionKeyCode(ACTION_MOVE_LEFT), true);
        pushKeyState(actionKeyCode(ACTION_MOVE_RIGHT), false);
        return;
      }

      if (moveRight && !moveLeft) {
        pushKeyState(actionKeyCode(ACTION_MOVE_RIGHT), true);
        pushKeyState(actionKeyCode(ACTION_MOVE_LEFT), false);
        return;
      }

      pushKeyState(actionKeyCode(ACTION_MOVE_LEFT), false);
      pushKeyState(actionKeyCode(ACTION_MOVE_RIGHT), false);
    }

    function releaseMovePointers() {
      if (controlState.moveLeftPointers.size === 0 && controlState.moveRightPointers.size === 0) {
        return;
      }
      controlState.moveLeftPointers.clear();
      controlState.moveRightPointers.clear();
      syncMoveKeys();
    }

    function releaseButtonPointers(setRef, action) {
      if (setRef.size === 0) {
        return;
      }
      setRef.clear();
      pushKeyState(actionKeyCode(action), false);
    }

    function releaseAllControlKeys() {
      controlState.moveLeftPointers.clear();
      controlState.moveRightPointers.clear();
      controlState.firePointers.clear();
      controlState.deployPointers.clear();
      for (const keyCode of Array.from(controlState.heldKeys)) {
        pushKeyState(keyCode, false);
      }
    }

    function syncCanvasSize() {
      const mobileTouchLayout = shouldUseMobileTouchLayout();
      const contentRect = contentElement.getBoundingClientRect();
      const maxWidth = Math.max(240, Math.min(900, contentRect.width));

      const controlsHeight = mobileTouchLayout
        ? controlsElement.getBoundingClientRect().height + 10
        : 0;
      const titleHeight = titleElement ? titleElement.getBoundingClientRect().height : 0;
      const statusVisible = statusElement && statusElement.offsetParent !== null;
      const statusHeight = statusVisible ? statusElement.getBoundingClientRect().height : 0;
      const verticalChrome = mobileTouchLayout ? 40 : 62;
      const headerAllowance = titleHeight + statusHeight + verticalChrome;
      const availableHeight = Math.max(240, window.innerHeight - controlsHeight - headerAllowance);
      const side = Math.max(220, Math.min(maxWidth, availableHeight));

      canvasElement.style.width = `${Math.round(side)}px`;
      canvasElement.style.height = `${Math.round(side)}px`;
    }

    function shouldUseMobileTouchLayout() {
      return coarsePointerQuery.matches && portraitQuery.matches;
    }

    function shouldUseMobileControls() {
      return shouldUseMobileTouchLayout() && controlState.gameplayActive;
    }

    function applyControlsMode() {
      const nextActive = shouldUseMobileControls();
      const canvasTouchscreenEnabled = !shouldUseMobileTouchLayout();
      setMobileLayout(shouldUseMobileTouchLayout());
      updateControlLegend();
      if (nextActive === controlState.controlsActive) {
        setCanvasTouchscreenEnabled(canvasTouchscreenEnabled);
        syncCanvasSize();
        return;
      }

      controlState.controlsActive = nextActive;
      document.body.classList.toggle("mobile-controls-active", nextActive);
      controlsElement.setAttribute("aria-hidden", nextActive ? "false" : "true");

      if (!nextActive) {
        releaseAllControlKeys();
      }

      setCanvasTouchscreenEnabled(canvasTouchscreenEnabled);
      syncCanvasSize();
    }

    function pollGameplayState() {
      if (!bridgeReady()) {
        return;
      }
      const active = queryGameplayActive();
      if (active !== controlState.gameplayActive) {
        controlState.gameplayActive = active;
        applyControlsMode();
      } else if (controlState.controlsActive) {
        updateControlLegend();
      }
    }

    function addMediaListener(query, listener) {
      if (typeof query.addEventListener === "function") {
        query.addEventListener("change", listener);
        return;
      }
      query.addListener(listener);
    }

    function onActionPointerDown(evt, setRef, action) {
      if (!controlState.controlsActive) {
        return;
      }
      evt.preventDefault();
      setRef.add(evt.pointerId);
      if (typeof evt.target.setPointerCapture === "function") {
        evt.target.setPointerCapture(evt.pointerId);
      }
      pushKeyState(actionKeyCode(action), true);
    }

    function onActionPointerUp(evt, setRef, action) {
      if (!setRef.delete(evt.pointerId)) {
        return;
      }
      if (setRef.size === 0) {
        pushKeyState(actionKeyCode(action), false);
      }
    }

    function onMovePointerDown(evt, setRef) {
      if (!controlState.controlsActive) {
        return;
      }
      evt.preventDefault();
      setRef.add(evt.pointerId);
      if (typeof evt.target.setPointerCapture === "function") {
        evt.target.setPointerCapture(evt.pointerId);
      }
      syncMoveKeys();
    }

    function onMovePointerUp(evt, setRef) {
      if (!setRef.delete(evt.pointerId)) {
        return;
      }
      syncMoveKeys();
    }

    moveLeftButton.addEventListener("pointerdown", (evt) => {
      onMovePointerDown(evt, controlState.moveLeftPointers);
    });
    moveLeftButton.addEventListener("pointerup", (evt) => {
      onMovePointerUp(evt, controlState.moveLeftPointers);
    });
    moveLeftButton.addEventListener("pointercancel", (evt) => {
      onMovePointerUp(evt, controlState.moveLeftPointers);
    });
    moveLeftButton.addEventListener("lostpointercapture", (evt) => {
      onMovePointerUp(evt, controlState.moveLeftPointers);
    });

    moveRightButton.addEventListener("pointerdown", (evt) => {
      onMovePointerDown(evt, controlState.moveRightPointers);
    });
    moveRightButton.addEventListener("pointerup", (evt) => {
      onMovePointerUp(evt, controlState.moveRightPointers);
    });
    moveRightButton.addEventListener("pointercancel", (evt) => {
      onMovePointerUp(evt, controlState.moveRightPointers);
    });
    moveRightButton.addEventListener("lostpointercapture", (evt) => {
      onMovePointerUp(evt, controlState.moveRightPointers);
    });

    fireButton.addEventListener("pointerdown", (evt) => {
      onActionPointerDown(evt, controlState.firePointers, ACTION_SHOOT);
    });
    fireButton.addEventListener("pointerup", (evt) => {
      onActionPointerUp(evt, controlState.firePointers, ACTION_SHOOT);
    });
    fireButton.addEventListener("pointercancel", (evt) => {
      onActionPointerUp(evt, controlState.firePointers, ACTION_SHOOT);
    });
    fireButton.addEventListener("lostpointercapture", (evt) => {
      onActionPointerUp(evt, controlState.firePointers, ACTION_SHOOT);
    });

    deployButton.addEventListener("pointerdown", (evt) => {
      onActionPointerDown(evt, controlState.deployPointers, ACTION_TRAP);
    });
    deployButton.addEventListener("pointerup", (evt) => {
      onActionPointerUp(evt, controlState.deployPointers, ACTION_TRAP);
    });
    deployButton.addEventListener("pointercancel", (evt) => {
      onActionPointerUp(evt, controlState.deployPointers, ACTION_TRAP);
    });
    deployButton.addEventListener("lostpointercapture", (evt) => {
      onActionPointerUp(evt, controlState.deployPointers, ACTION_TRAP);
    });

    window.addEventListener("blur", () => {
      releaseAllControlKeys();
      setPageActive(false);
    });

    window.addEventListener("focus", () => {
      syncPageActive();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") {
        releaseAllControlKeys();
      }
      syncPageActive();
    });

    window.addEventListener("pagehide", () => {
      releaseAllControlKeys();
      setPageActive(false);
    });

    window.addEventListener("pageshow", () => {
      syncPageActive();
    });

    document.addEventListener("freeze", () => {
      releaseAllControlKeys();
      setPageActive(false);
    });

    document.addEventListener("resume", () => {
      syncPageActive();
    });

    window.addEventListener("resize", () => {
      drawGameFontTitle();
      applyControlsMode();
      scheduleBackgroundRedraw();
    });

    addMediaListener(coarsePointerQuery, () => {
      applyControlsMode();
    });

    addMediaListener(portraitQuery, () => {
      applyControlsMode();
    });

    document.addEventListener("gesturestart", (evt) => {
      evt.preventDefault();
    }, { passive: false });

    document.addEventListener("gesturechange", (evt) => {
      evt.preventDefault();
    }, { passive: false });

    window.addEventListener("wheel", (evt) => {
      if (evt.ctrlKey) {
        evt.preventDefault();
      }
    }, { passive: false });

    var Module = {
      print: (...args) => console.log(args.join(" ")),
      printErr: (...args) => console.error(...args),
      canvas: (() => {
        const canvas = canvasElement;
        canvas.addEventListener("webglcontextlost", (event) => {
          alert("WebGL context lost. Reload the page to continue.");
          event.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: (text) => {
        statusElement.textContent = text || "";
      },
      totalDependencies: 0,
      monitorRunDependencies: (left) => {
        Module.totalDependencies = Math.max(Module.totalDependencies, left);
        Module.setStatus(left ? `Preparing... (${Module.totalDependencies - left}/${Module.totalDependencies})` : "");
      },
      onRuntimeInitialized: () => {
        controlState.runtimeReady = true;
        controlState.gameplayActive = queryGameplayActive();
        setPageActive(controlState.pageAudioActive);
        applyControlsMode();
        if (controlState.pollTimer !== null) {
          clearInterval(controlState.pollTimer);
        }
        controlState.pollTimer = window.setInterval(pollGameplayState, 140);
      },
    };

    Module.setStatus("Downloading...");
    initBackgroundTiles();
    drawGameFontTitle();
    syncPageActive();
    applyControlsMode();

    window.onerror = (message) => {
      Module.setStatus("Error. Check JavaScript console.");
      console.error(message);
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
