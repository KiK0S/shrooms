<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shrooms</title>
  <style>
    @font-face {
      font-family: "Vera";
      src: url("assets/Vera.ttf") format("truetype");
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Vera", sans-serif;
      background: #1b1f22;
      color: #dfd6ab;
      position: relative;
      overflow-x: hidden;
    }

    .decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .decor img {
      position: absolute;
      width: clamp(28px, 3.4vw, 52px);
      opacity: 0.28;
    }

    .d1 { left: 5%; top: 10%; }
    .d2 { left: 14%; bottom: 10%; }
    .d3 { left: 28%; top: 18%; }
    .d4 { right: 6%; top: 12%; }
    .d5 { right: 16%; bottom: 11%; }
    .d6 { right: 30%; top: 45%; }

    main {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 12px;
    }

    .content {
      width: min(1100px, 96vw);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: normal;
    }

    #status {
      margin: 0 0 8px;
      text-align: center;
      font-size: 0.8rem;
      color: #cfc6a0;
      min-height: 1rem;
    }

    #canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: none !important;
      outline: none;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div class="decor" aria-hidden="true">
    <img class="d1" src="assets/shrooms/mukhomor_small.svg" alt="">
    <img class="d2" src="assets/shrooms/borovik_small.svg" alt="">
    <img class="d3" src="assets/shrooms/famiriar.svg" alt="">
    <img class="d4" src="assets/shrooms/mukhomor_small.svg" alt="">
    <img class="d5" src="assets/shrooms/borovik_small.svg" alt="">
    <img class="d6" src="assets/shrooms/famiriar.svg" alt="">
  </div>

  <main>
    <section class="content">
      <h1>Shrooms</h1>
      <p id="status">Downloading...</p>
      <canvas id="canvas" width="1280" height="720" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    </section>
  </main>

  <script>
    const statusElement = document.getElementById("status");

    var Module = {
      print: (...args) => console.log(args.join(" ")),
      printErr: (...args) => console.error(...args),
      canvas: (() => {
        const canvas = document.getElementById("canvas");
        canvas.addEventListener("webglcontextlost", (event) => {
          alert("WebGL context lost. Reload the page to continue.");
          event.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: (text) => {
        statusElement.textContent = text || "";
      },
      totalDependencies: 0,
      monitorRunDependencies: (left) => {
        Module.totalDependencies = Math.max(Module.totalDependencies, left);
        Module.setStatus(left ? `Preparing... (${Module.totalDependencies - left}/${Module.totalDependencies})` : "");
      }
    };

    Module.setStatus("Downloading...");

    window.onerror = (message) => {
      Module.setStatus("Error. Check JavaScript console.");
      console.error(message);
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
