<!doctype html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shrooms</title>
  <style>
    @font-face {
      font-family: "Vera";
      src: url("assets/Vera.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg-0: #121416;
      --bg-1: #1a1f22;
      --bg-2: #22282c;
      --blue: #007aff;
      --red: #b83c3d;
      --cream: #dfd6ab;
      --moss: #749914;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background: var(--bg-0);
    }

    body {
      font-family: "Vera", "Trebuchet MS", sans-serif;
      color: var(--cream);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(116, 153, 20, 0.16), transparent 28%),
        radial-gradient(circle at 85% 22%, rgba(184, 60, 61, 0.14), transparent 30%),
        radial-gradient(circle at 20% 85%, rgba(0, 122, 255, 0.12), transparent 28%),
        linear-gradient(155deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.15;
      background-image:
        repeating-linear-gradient(35deg, transparent 0 26px, rgba(223, 214, 171, 0.1) 26px 28px),
        repeating-linear-gradient(-35deg, transparent 0 28px, rgba(0, 122, 255, 0.08) 28px 29px);
      z-index: 0;
    }

    .decor {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .decor img {
      position: absolute;
      width: clamp(34px, 4.2vw, 70px);
      opacity: 0.32;
    }

    .d1 { left: 4%; top: 8%; }
    .d2 { left: 12%; bottom: 10%; }
    .d3 { left: 23%; top: 20%; }
    .d4 { left: 34%; bottom: 6%; }
    .d5 { right: 4%; top: 10%; }
    .d6 { right: 12%; bottom: 12%; }
    .d7 { right: 24%; top: 18%; }
    .d8 { right: 31%; bottom: 7%; }
    .d9 { left: 8%; top: 45%; }
    .d10 { right: 9%; top: 46%; }

    .layout {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 1.1rem 0.7rem 1.3rem;
    }

    .content {
      width: min(1120px, 96vw);
    }

    .title {
      margin: 0 0 0.45rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--cream);
    }

    #status {
      margin: 0 0 0.7rem;
      text-align: center;
      font-size: 0.82rem;
      color: rgba(223, 214, 171, 0.88);
      min-height: 1.1rem;
    }

    .canvas-wrap {
      width: 100%;
      margin: 0 auto;
      background: #000;
    }

    #canvas {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      background: #000;
      outline: none;
    }

    @media (max-width: 800px) {
      .decor img {
        opacity: 0.24;
      }
    }
  </style>
</head>
<body>
  <div class="decor" aria-hidden="true">
    <img class="d1" src="assets/shrooms/mukhomor_small.svg" alt="">
    <img class="d2" src="assets/shrooms/borovik_small.svg" alt="">
    <img class="d3" src="assets/shrooms/famiriar.svg" alt="">
    <img class="d4" src="assets/shrooms/mukhomor_small.svg" alt="">
    <img class="d5" src="assets/shrooms/borovik_small.svg" alt="">
    <img class="d6" src="assets/shrooms/famiriar.svg" alt="">
    <img class="d7" src="assets/shrooms/mukhomor_small.svg" alt="">
    <img class="d8" src="assets/shrooms/borovik_small.svg" alt="">
    <img class="d9" src="assets/shrooms/famiriar.svg" alt="">
    <img class="d10" src="assets/shrooms/famiriar.svg" alt="">
  </div>

  <main class="layout">
    <section class="content">
      <h1 class="title">Shrooms</h1>
      <p id="status">Downloading...</p>
      <div class="canvas-wrap">
        <canvas id="canvas" width="1280" height="720" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
      </div>
    </section>
  </main>

  <script>
    const statusElement = document.getElementById("status");

    var Module = {
      print: (...args) => console.log(args.join(" ")),
      printErr: (...args) => console.error(...args),
      canvas: (() => {
        const canvas = document.getElementById("canvas");
        canvas.addEventListener("webglcontextlost", (event) => {
          alert("WebGL context lost. Reload the page to continue.");
          event.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: (text) => {
        statusElement.textContent = text || "";
      },
      totalDependencies: 0,
      monitorRunDependencies: (left) => {
        Module.totalDependencies = Math.max(Module.totalDependencies, left);
        Module.setStatus(
          left
            ? `Preparing... (${Module.totalDependencies - left}/${Module.totalDependencies})`
            : ""
        );
      }
    };

    Module.setStatus("Downloading...");

    window.onerror = (message) => {
      Module.setStatus("Error. Check JavaScript console.");
      console.error(message);
    };
  </script>

  {{{ SCRIPT }}}
</body>
</html>
